{% extends "base.html" %}
{% block title %}下载中心 - 墨栖洗歌平台{% endblock %}
{% block content %}
<h1 class="mb-20">下载中心</h1>
<div class="card" style="padding:0">
    <ul class="download-list">
        {% for f in files %}
        <li>
            <div>
                <strong>{{ f.name }}</strong>
                <p style="font-size:13px;color:#86868b;margin-top:4px">{{ f.desc }}</p>
            </div>
            <a href="{{ url_for('download_file', filename=f.name) }}" class="btn btn-secondary btn-sm">下载</a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
