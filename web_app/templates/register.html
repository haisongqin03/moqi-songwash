{% extends "base.html" %}
{% block title %}注册 - 墨栖洗歌平台{% endblock %}
{% block content %}
<div class="auth-form">
    <div class="card">
        <h2>注册</h2>
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="输入用户名（如：危江滨）">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" required placeholder="输入邮箱地址">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="设置密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">注册</button>
        </form>
        <div class="auth-link">已有账号？<a href="{{ url_for('login') }}">登录</a></div>
    </div>
</div>
{% endblock %}
