{% extends "base.html" %}
{% block title %}新建项目 - 墨栖洗歌平台{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
    <div class="card">
        <h2>新建洗歌项目</h2>
        <form method="POST">
            <div class="form-group">
                <label>歌曲名称</label>
                <input type="text" name="song_name" required placeholder="例：渡口不回头">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>歌曲等级</label>
                    <select name="grade">
                        <option value="A">A级（5项改造，5-8分钟/首）</option>
                        <option value="S">S级（6项改造，2-4小时/首）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>BPM（速度）</label>
                    <input type="number" name="bpm" value="120" min="60" max="200">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">创建项目</button>
        </form>
        <p style="font-size:13px;color:#86868b;margin-top:12px">创建后将自动生成对应等级的12轨REAPER工程文件(.RPP)，可直接下载使用。</p>
    </div>
</div>
{% endblock %}
